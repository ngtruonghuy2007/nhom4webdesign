<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - VNU-IS News</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
   <nav class="main-nav">
        <ul>

            <li><a href="./tintuc.html">Trang chủ</a></li>
            <li><a href="#">Thể thao</a></li>
            <li><a href="#">Kinh tế</a></li>
            <li><a href="register.html">Đăng ký</a></li>
            <li><a href="#index.html">Phản hồi</a></li>
        </ul>
    </nav>
    <main class="container form-page">
        <section class="registration-container">
            <h2>Đăng ký tài khoản mới</h2>
            <p>Tham gia cộng đồng để bình luận và lưu bài viết.</p>
            
            <form action="#" method="POST" class="registration-form">
                <div class="form-group">
                    <label for="fullname">Họ và tên:</label>
                    <input type="text" id="fullname" name="fullname" required placeholder="Nhập họ và tên">
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="ví dụ: mssv@vnu.edu.vn">
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu:</label>
                    <input type="password" id="password" name="password" required minlength="6" placeholder="Ít nhất 6 ký tự">
                </div>

                <button type="submit" class="btn btn-primary btn-full">Đăng ký ngay</button>
            </form>
        </section>
    </main>
</body>
</html>
